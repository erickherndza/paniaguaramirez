name: Deploy Paniagua Ramírez → Banahosting vía FTP

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Subir archivos al servidor
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Deploy FTP → Banahosting
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_DIR:  ${{ secrets.FTP_DIR }}
        run: |
          lftp -u "$FTP_USER,$FTP_PASS" "ftp://$FTP_HOST" -e "
            set net:timeout 60;
            set net:max-retries 5;
            set net:reconnect-interval-base 5;
            set ftp:ssl-allow yes;
            set ssl:verify-certificate no;
            set ftp:passive-mode yes;
            mirror --reverse --verbose --no-perms --parallel=3 \
              --exclude-glob .git/ \
              --exclude-glob .github/ \
              --exclude-glob .DS_Store \
              --exclude-glob .nojekyll \
              --exclude-glob CLAUDE.md \
              --exclude-glob .gitignore \
              . $FTP_DIR;
            quit"
