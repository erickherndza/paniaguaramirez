name: Deploy Paniagua Ramírez → Banahosting vía FTP

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Subir archivos al servidor
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via lftp
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_DIR: ${{ secrets.FTP_DIR }}
        run: |
          printf '%s\n' \
            "set ftp:ssl-allow yes" \
            "set ftp:ssl-protect-data yes" \
            "set ssl:verify-certificate no" \
            "set net:timeout 60" \
            "set net:max-retries 5" \
            "set net:reconnect-interval-base 5" \
            "open -u $FTP_USER,$FTP_PASS ftp://$FTP_HOST" \
            "lcd $GITHUB_WORKSPACE" \
            "mirror --reverse --delete --no-perms --verbose \
              --exclude-glob .git \
              --exclude-glob .github \
              --exclude-glob .gitignore \
              --exclude-glob CLAUDE.md \
              --exclude-glob .DS_Store \
              --exclude-glob .nojekyll \
              . $FTP_DIR" \
            "bye" \
            > /tmp/lftp_cmds.txt
          lftp -f /tmp/lftp_cmds.txt
